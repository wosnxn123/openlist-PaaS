name: Build OpenList for PaaS

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 获取官方最新版本号
        id: set-matrix
        run: |
          LATEST=$(curl -sL https://api.github.com/repos/OpenListTeam/OpenList/releases/latest | jq -r .tag_name)
          if [ "$LATEST" == "null" ] || [ -z "$LATEST" ]; then LATEST="v4.1.0"; fi
          echo "matrix=[\"beta\", \"latest\", \"$LATEST\"]" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    # 赋予推送到 GitHub 镜像仓库的权限
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.prepare.outputs.matrix) }}
    
    steps:
      - name: 配置 QEMU (支持多架构)
        uses: docker/setup-qemu-action@v3
        
      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 登录 GitHub Packages (ghcr.io)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 准备基础镜像和名称变量
        run: |
          # 判断官方基础镜像地址
          if [ "${{ matrix.tag }}" == "beta" ]; then
            echo "BASE_IMAGE=ghcr.io/openlistteam/openlist-git:beta" >> $GITHUB_ENV
          else
            echo "BASE_IMAGE=openlistteam/openlist:${{ matrix.tag }}" >> $GITHUB_ENV
          fi
          
          # 将 GitHub 用户名转为纯小写，以符合 Docker 规范
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          echo "GHCR_IMAGE=ghcr.io/$OWNER/openlist-for-paas" >> $GITHUB_ENV
          echo "DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/openlist-for-paas" >> $GITHUB_ENV

      - name: 生成兼容 PaaS 的 Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM $BASE_IMAGE
          USER root
          RUN mkdir -p /opt/openlist/data && chmod -R 777 /opt/openlist/data
          EOF

      - name: 构建并推送到双端
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ matrix.tag }}
            ${{ env.GHCR_IMAGE }}:${{ matrix.tag }}

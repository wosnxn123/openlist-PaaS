name: Build OpenList PaaS (Docker Hub)

on:
  schedule:
    - cron: '0 2 * * *' # 每天 UTC 02:00 自动运行（北京时间 10:00）
  workflow_dispatch:

jobs:
  prepare-tags:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.get-tags.outputs.matrix_json }}
    steps:
      - name: Fetch latest version tag from Docker Hub
        id: get-tags
        shell: bash
        run: |
          set -euo pipefail

          TAGS_JSON="$(curl -fsSL 'https://hub.docker.com/v2/repositories/openlistteam/openlist/tags?page_size=100&ordering=last_updated')"

          LATEST_VERSION="$(echo "$TAGS_JSON" \
            | jq -r '.results[].name | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
            | sort -V \
            | tail -n 1)"

          if [ -z "$LATEST_VERSION" ]; then
            echo "::error::无法从 Docker Hub 获取 openlistteam/openlist 的最新正式版 v* tag"
            exit 1
          fi

          MATRIX_JSON="$(jq -cn --arg v "$LATEST_VERSION" '["beta", "latest", $v]')"

          echo "Docker Hub 最新正式版 tag: $LATEST_VERSION"
          echo "构建矩阵: $MATRIX_JSON"
          echo "matrix_json=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare-tags
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.prepare-tags.outputs.matrix_json) }}

    steps:
      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine Docker Hub base image
        shell: bash
        run: |
          set -euo pipefail
          echo "BASE_IMAGE=openlistteam/openlist:${{ matrix.tag }}" >> "$GITHUB_ENV"
          echo "Using Docker Hub base image: openlistteam/openlist:${{ matrix.tag }}"

      - name: Generate wrapper Dockerfile
        shell: bash
        run: |
          set -euo pipefail
          cat > Dockerfile <<EOF_DOCKERFILE
          FROM ${BASE_IMAGE}

          USER root

          RUN mkdir -p /opt/openlist/data && \
              chmod -R 777 /opt/openlist/data
          EOF_DOCKERFILE

          echo "Generated Dockerfile:"
          cat Dockerfile

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          pull: true
          no-cache: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386
          tags: ${{ secrets.DOCKER_USERNAME }}/openlist-paas:${{ matrix.tag }}

name: 构建适用于PaaS的OpenList (Docker Hub 和 GitHub)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  prepare-tags:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.get-tags.outputs.matrix_json }}
    steps:
      - name: 获取最新正式版标签
        id: get-tags
        run: |
          LATEST_VERSION=$(curl -sL https://api.github.com/repos/OpenListTeam/OpenList/releases/latest | jq -r .tag_name)
          
          if [ "$LATEST_VERSION" == "null" ] ||[ -z "$LATEST_VERSION" ]; then
            LATEST_VERSION="v4.1.0"
          fi
          
          echo "获取到官方最新版本号: $LATEST_VERSION"
          echo "matrix_json=[\"beta\", \"latest\", \"$LATEST_VERSION\"]" >> $GITHUB_OUTPUT

  build-and-push:
    needs: prepare-tags
    runs-on: ubuntu-latest
    
    permissions:
      packages: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.prepare-tags.outputs.matrix_json) }}
    
    steps:
      - name: 设置QEMU以支持多架构
        uses: docker/setup-qemu-action@v3
        
      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 登录GitHub容器仓库
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 将GitHub用户名转换为小写
        run: echo "GH_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: 确定官方基础镜像
        run: |
          if [ "${{ matrix.tag }}" == "beta" ]; then
            echo "BASE_IMAGE=ghcr.io/openlistteam/openlist-git:beta" >> $GITHUB_ENV
          else
            echo "BASE_IMAGE=openlistteam/openlist:${{ matrix.tag }}" >> $GITHUB_ENV
          fi

      - name: 生成包装Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM $BASE_IMAGE
          USER root
          RUN mkdir -p /opt/openlist/data && \
              chmod -R 777 /opt/openlist/data
          EOF

      - name: 构建并推送到双端仓库
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openlist-for-paas:${{ matrix.tag }}
            ghcr.io/${{ env.GH_OWNER }}/openlist-for-paas:${{ matrix.tag }}

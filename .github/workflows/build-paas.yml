name: Build OpenList for PaaS

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  prepare-tags:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.get-tags.outputs.matrix_json }}
    steps:
      - name: 获取官方最新正式版号
        id: get-tags
        run: |
          LATEST_VERSION=$(curl -sL https://api.github.com/repos/OpenListTeam/OpenList/releases/latest | jq -r .tag_name)
          if [ "$LATEST_VERSION" == "null" ] ||[ -z "$LATEST_VERSION" ]; then
            LATEST_VERSION="v4.1.0"
          fi
          echo "matrix_json=[\"beta\", \"latest\", \"$LATEST_VERSION\"]" >> $GITHUB_OUTPUT

  build-and-push:
    needs: prepare-tags
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.prepare-tags.outputs.matrix_json) }}
    
    # 赋予推送到 GitHub 容器仓库 (GHCR) 的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: 设置 QEMU (支持多架构)
        uses: docker/setup-qemu-action@v3
        
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 登录 GitHub 容器仓库 (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 准备环境变量
        run: |
          if[ "${{ matrix.tag }}" == "beta" ]; then
            echo "BASE_IMAGE=ghcr.io/openlistteam/openlist-git:beta" >> $GITHUB_ENV
          else
            echo "BASE_IMAGE=openlistteam/openlist:${{ matrix.tag }}" >> $GITHUB_ENV
          fi
          # 将 GitHub 用户名转为小写，防止 Docker 镜像名规范报错
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: 动态生成 Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM $BASE_IMAGE
          USER root
          RUN mkdir -p /opt/openlist/data && chmod -R 777 /opt/openlist/data
          EOF

      - name: 构建并推送到 Docker Hub 和 GitHub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 构建官方支持的全部架构
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/openlist-for-paas:${{ matrix.tag }}
            ghcr.io/${{ env.OWNER_LC }}/openlist-for-paas:${{ matrix.tag }}
